name: External Plugin Drift Check

# Runs Layer 8 (live validation of external marketplace entries) on a cron.
# Catches the failure mode where an external entry's upstream silently
# rots — repo deleted, plugin renamed, marketplace.json removed, npm
# package unpublished. Without this, drift is only discovered when an
# end user tries to install and gets a broken plugin.
#
# On failure: opens (or updates) a GitHub issue tagged `external-drift`.
# On success: closes any open `external-drift` issue with a resolved note.
#
# When this repo has zero external marketplace entries, this workflow
# trivially passes — Layer 8 has nothing to validate. It becomes
# load-bearing the moment any adopter (or this repo) adds an entry with
# a github / url / npm source.

on:
  schedule:
    # Mondays at 09:00 UTC. Adjust to taste.
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node (for npm-source validation)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run live external entry validation
        id: validate
        run: |
          set +e
          DEWEY_VALIDATE_EXTERNAL=1 bash tests/run.sh > drift-output.log 2>&1
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          # Surface the tail of the log in the workflow run for human inspection
          echo "----- last 100 lines of test output -----"
          tail -100 drift-output.log
          # Don't fail the step here — we want subsequent issue-management
          # steps to run regardless. Final fail step at the end.

      - name: Open or update drift issue
        if: steps.validate.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('drift-output.log', 'utf8');
            // Keep the body under GitHub's issue-body limit (65536 chars);
            // 8KB tail is plenty to identify the broken entry.
            const tail = raw.slice(-8000);
            const title = 'External plugin drift detected';
            const body = [
              'Layer 8 live validation failed during the scheduled drift-check run.',
              '',
              `Triggered by: \`${context.workflow}\` (\`${context.eventName}\`) run #${context.runNumber}`,
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Output (last 8KB):',
              '',
              '```',
              tail,
              '```',
              '',
              '_Auto-generated by `.github/workflows/drift-check.yml`. Will close automatically when validation passes._',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'external-drift',
              state: 'open',
              per_page: 5,
            });

            if (existing.data.length > 0) {
              const num = existing.data[0].number;
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                body,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                body: `Still failing as of ${new Date().toISOString()} — see workflow run #${context.runNumber}.`,
              });
              core.info(`Updated existing drift issue #${num}.`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['external-drift'],
              });
              core.info(`Opened new drift issue #${created.data.number}.`);
            }

      - name: Close drift issues if validation passed
        if: steps.validate.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'external-drift',
              state: 'open',
              per_page: 20,
            });
            if (existing.data.length === 0) {
              core.info('No open drift issues; nothing to close.');
              return;
            }
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Drift resolved as of ${new Date().toISOString()} — workflow run #${context.runNumber} passed. Closing automatically.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              core.info(`Closed drift issue #${issue.number}.`);
            }

      - name: Fail the job if validation failed
        if: steps.validate.outputs.exit_code != '0'
        run: |
          echo "Layer 8 live validation failed. See preceding step output and the open 'external-drift' issue."
          exit 1
