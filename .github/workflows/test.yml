name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite
        run: bash tests/run.sh

  eval:
    # Eval harness smoke test in skip mode (no backend, no API credits).
    # The real eval (DEWEY_EVAL=1 + backend) runs manually/pre-release.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Eval harness smoke (skip mode)
        run: python3 evals/run_eval.py || [ $? -eq 77 ]
